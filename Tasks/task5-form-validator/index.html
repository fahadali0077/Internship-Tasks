<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 5 - Dynamic Form Validator SPA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; color: #333; padding: 20px; }
    h1 { color: #2c3e50; margin-bottom: 5px; }
    .subtitle { color: #777; font-size: 13px; margin-bottom: 20px; }
    .container { max-width: 700px; margin: 0 auto; }

    .form-section { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); margin-bottom: 20px; }
    h2 { font-size: 16px; color: #2c3e50; margin-bottom: 15px; }

    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #555; }
    input, select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; transition: border 0.2s; }
    input:focus, select:focus { outline: none; border-color: #3498db; }
    input.valid { border-color: #27ae60; }
    input.invalid { border-color: #e74c3c; }
    .error-msg { color: #e74c3c; font-size: 12px; margin-top: 3px; min-height: 16px; }
    .hint { color: #888; font-size: 11px; margin-top: 2px; }

    button { padding: 9px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #3498db; color: white; }
    .btn-primary:hover { background: #2980b9; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-edit { background: #f39c12; color: white; font-size: 12px; padding: 5px 10px; }
    .btn-edit:hover { background: #e67e22; }

    .task-list { list-style: none; }
    .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f9f9f9; border-radius: 4px; margin-bottom: 8px; border: 1px solid #eee; }
    .task-item.editing { background: #fffde7; border-color: #f39c12; }
    .task-item span { flex: 1; font-size: 14px; }
    .task-priority { font-size: 11px; padding: 2px 8px; border-radius: 10px; color: white; }
    .priority-high { background: #e74c3c; }
    .priority-medium { background: #f39c12; }
    .priority-low { background: #27ae60; }

    .status-bar { background: #ecf0f1; border-radius: 4px; padding: 8px 12px; font-size: 13px; color: #555; margin-bottom: 10px; }
    .resize-indicator { background: #2ecc71; color: white; border-radius: 4px; padding: 6px 12px; font-size: 12px; margin-bottom: 10px; display: none; }
    .empty-state { text-align: center; color: #aaa; padding: 30px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ Dynamic Form Validator SPA</h1>
    <p class="subtitle">Event delegation · Debounced validation · Throttled resize · localStorage persistence</p>

    <div class="resize-indicator" id="resizeIndicator">Window resized! (throttled)</div>

    <!-- Add/Edit Task Form -->
    <div class="form-section">
      <h2>➕ Add New Task</h2>
      <div class="form-group">
        <label>Task Name</label>
        <input type="text" id="taskName" placeholder="e.g. Complete JS assignment" />
        <div class="error-msg" id="taskNameError"></div>
      </div>
      <div class="form-group">
        <label>Email (for notifications)</label>
        <input type="text" id="taskEmail" placeholder="e.g. user@example.com" />
        <div class="error-msg" id="taskEmailError"></div>
        <div class="hint">Debounced validation (400ms delay)</div>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="taskPriority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <button class="btn-primary" id="submitBtn">Add Task</button>
      <button class="btn-danger" id="cancelEditBtn" style="display:none; margin-left:8px;">Cancel Edit</button>
    </div>

    <!-- Task List -->
    <div class="form-section">
      <h2>📋 Task List</h2>
      <div class="status-bar" id="statusBar">No tasks yet.</div>
      <!-- Event delegation: one listener on this ul handles all task actions -->
      <ul class="task-list" id="taskList">
        <li class="empty-state" id="emptyState">No tasks added yet. Add one above!</li>
      </ul>
    </div>
  </div>

  <script>
    // =============================================
    // State (persisted to localStorage)
    // =============================================
    let tasks = loadFromStorage();
    let editingId = null;

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem('spa_tasks');
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveToStorage() {
      localStorage.setItem('spa_tasks', JSON.stringify(tasks));
    }

    // =============================================
    // DOM Selectors
    // =============================================
    const taskList = document.getElementById('taskList');
    const taskNameInput = document.getElementById('taskName');
    const taskEmailInput = document.getElementById('taskEmail');
    const taskPrioritySelect = document.getElementById('taskPriority');
    const submitBtn = document.getElementById('submitBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const statusBar = document.getElementById('statusBar');
    const emptyState = document.getElementById('emptyState');

    // =============================================
    // Validation
    // =============================================
    function validateName(value) {
      if (!value.trim()) return 'Task name is required.';
      if (value.trim().length < 3) return 'Task name must be at least 3 characters.';
      return '';
    }

    function validateEmail(value) {
      if (!value.trim()) return 'Email is required.';
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(value.trim())) return 'Please enter a valid email address.';
      return '';
    }

    function setFieldState(inputId, errorId, errorMsg) {
      const input = document.getElementById(inputId);
      const errorEl = document.getElementById(errorId);
      errorEl.textContent = errorMsg;
      if (errorMsg) {
        input.className = 'invalid';
      } else if (input.value.trim()) {
        input.className = 'valid';
      } else {
        input.className = '';
      }
    }

    // =============================================
    // Debounce
    // =============================================
    function debounce(fn, delay) {
      let timer;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    // Debounced email validation
    const debouncedEmailValidation = debounce(function (value) {
      const error = validateEmail(value);
      setFieldState('taskEmail', 'taskEmailError', error);
    }, 400);

    // Debounced name validation
    const debouncedNameValidation = debounce(function (value) {
      const error = validateName(value);
      setFieldState('taskName', 'taskNameError', error);
    }, 300);

    // =============================================
    // Throttle
    // =============================================
    function throttle(fn, interval) {
      let lastTime = 0;
      return function (...args) {
        const now = Date.now();
        if (now - lastTime >= interval) {
          lastTime = now;
          fn.apply(this, args);
        }
      };
    }

    const indicator = document.getElementById('resizeIndicator');
    const handleResize = throttle(function () {
      const w = window.innerWidth;
      indicator.textContent = `🖥 Window resized: ${w}px (throttled every 500ms)`;
      indicator.style.display = 'block';
      clearTimeout(handleResize._hideTimer);
      handleResize._hideTimer = setTimeout(() => {
        indicator.style.display = 'none';
      }, 1500);
    }, 500);

    // =============================================
    // Render Tasks
    // =============================================
    function renderTasks() {
      // Remove all task items (but keep emptyState)
      const existing = taskList.querySelectorAll('.task-item');
      existing.forEach(el => el.remove());

      if (tasks.length === 0) {
        emptyState.style.display = 'block';
        statusBar.textContent = 'No tasks yet.';
        return;
      }

      emptyState.style.display = 'none';

      // DOM manipulation: traverse and build tree
      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `task-item${editingId === task.id ? ' editing' : ''}`;
        li.dataset.id = task.id; // store id on element for event delegation

        // Traverse DOM: create child elements
        const nameSpan = document.createElement('span');
        nameSpan.textContent = task.name;

        const emailSpan = document.createElement('span');
        emailSpan.style.fontSize = '11px';
        emailSpan.style.color = '#888';
        emailSpan.textContent = task.email;

        const priorityBadge = document.createElement('span');
        priorityBadge.className = `task-priority priority-${task.priority}`;
        priorityBadge.textContent = task.priority;

        const editBtn = document.createElement('button');
        editBtn.className = 'btn-edit';
        editBtn.dataset.action = 'edit'; // used by event delegation
        editBtn.textContent = '✏️ Edit';

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn-danger';
        deleteBtn.style.cssText = 'font-size:12px;padding:5px 10px;';
        deleteBtn.dataset.action = 'delete';
        deleteBtn.textContent = '🗑️ Delete';

        // Append children
        li.append(nameSpan, emailSpan, priorityBadge, editBtn, deleteBtn);
        taskList.append(li);
      });

      // Update status bar
      const done = tasks.filter(t => t.completed).length;
      statusBar.textContent = `Total: ${tasks.length} task(s) | Editing: ${editingId ? 'Yes' : 'No'}`;
    }

    // =============================================
    // Event Delegation on task list
    // One listener handles edit AND delete for ALL items
    // =============================================
    taskList.addEventListener('click', function (e) {
      // Walk up the DOM to find the action button
      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      const li = btn.closest('.task-item');
      if (!li) return;

      const id = Number(li.dataset.id);
      const action = btn.dataset.action;

      if (action === 'delete') {
        tasks = tasks.filter(t => t.id !== id);
        saveToStorage();
        if (editingId === id) cancelEdit();
        renderTasks();
      }

      if (action === 'edit') {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        editingId = id;
        taskNameInput.value = task.name;
        taskEmailInput.value = task.email;
        taskPrioritySelect.value = task.priority;
        submitBtn.textContent = '💾 Save Changes';
        cancelEditBtn.style.display = 'inline-block';
        taskNameInput.focus();
        renderTasks();
      }
    });

    // =============================================
    // Submit (add or edit task)
    // =============================================
    submitBtn.addEventListener('click', function (e) {
      e.preventDefault(); // prevent default form behavior

      const name = taskNameInput.value;
      const email = taskEmailInput.value;
      const priority = taskPrioritySelect.value;

      // Validate
      const nameError = validateName(name);
      const emailError = validateEmail(email);
      setFieldState('taskName', 'taskNameError', nameError);
      setFieldState('taskEmail', 'taskEmailError', emailError);

      if (nameError || emailError) return;

      if (editingId) {
        // Edit existing task
        tasks = tasks.map(t =>
          t.id === editingId ? { ...t, name: name.trim(), email: email.trim(), priority } : t
        );
        cancelEdit();
      } else {
        // Add new task
        tasks.push({
          id: Date.now(),
          name: name.trim(),
          email: email.trim(),
          priority,
          completed: false,
        });
      }

      saveToStorage();
      clearForm();
      renderTasks();
    });

    cancelEditBtn.addEventListener('click', function () {
      cancelEdit();
      clearForm();
      renderTasks();
    });

    function cancelEdit() {
      editingId = null;
      submitBtn.textContent = 'Add Task';
      cancelEditBtn.style.display = 'none';
    }

    function clearForm() {
      taskNameInput.value = '';
      taskEmailInput.value = '';
      taskPrioritySelect.value = 'medium';
      taskNameInput.className = '';
      taskEmailInput.className = '';
      document.getElementById('taskNameError').textContent = '';
      document.getElementById('taskEmailError').textContent = '';
    }

    // =============================================
    // Live debounced input listeners
    // =============================================
    taskNameInput.addEventListener('input', (e) => debouncedNameValidation(e.target.value));
    taskEmailInput.addEventListener('input', (e) => debouncedEmailValidation(e.target.value));

    // =============================================
    // Window resize throttle
    // =============================================
    window.addEventListener('resize', handleResize);

    // =============================================
    // Initial render
    // =============================================
    renderTasks();
  </script>
</body>
</html>
