<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 5 - Form Validator SPA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
    h1 { color: #2c3e50; margin-bottom: 5px; }
    .subtitle { color: #777; font-size: 13px; margin-bottom: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    .form-section { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); margin-bottom: 20px; }
    h2 { font-size: 16px; margin-bottom: 15px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    input.valid { border-color: #27ae60; }
    input.invalid { border-color: #e74c3c; }
    .error-msg { color: #e74c3c; font-size: 12px; margin-top: 3px; min-height: 16px; }
    .hint { color: #888; font-size: 11px; margin-top: 2px; }
    button { padding: 9px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #3498db; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-edit { background: #f39c12; color: white; font-size: 12px; padding: 5px 10px; }
    .task-list { list-style: none; }
    .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f9f9f9; border-radius: 4px; margin-bottom: 8px; border: 1px solid #eee; }
    .task-item.editing { background: #fffde7; border-color: #f39c12; }
    .task-item span { flex: 1; font-size: 14px; }
    .task-priority { font-size: 11px; padding: 2px 8px; border-radius: 10px; color: white; }
    .priority-high { background: #e74c3c; }
    .priority-medium { background: #f39c12; }
    .priority-low { background: #27ae60; }
    .status-bar { background: #ecf0f1; border-radius: 4px; padding: 8px 12px; font-size: 13px; margin-bottom: 10px; }
    .resize-info { background: #2ecc71; color: white; border-radius: 4px; padding: 6px 12px; font-size: 12px; margin-bottom: 10px; display: none; }
    .empty-state { text-align: center; color: #aaa; padding: 30px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dynamic Form Validator SPA</h1>
    <p class="subtitle">event delegation | debounced validation | throttled resize | localStorage</p>

    <div class="resize-info" id="resizeInfo">window resized (throttled)</div>

    <div class="form-section">
      <h2>Add New Task</h2>
      <div class="form-group">
        <label>Task Name</label>
        <input type="text" id="taskName" placeholder="enter task name" />
        <div class="error-msg" id="taskNameError"></div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="taskEmail" placeholder="user@example.com" />
        <div class="error-msg" id="taskEmailError"></div>
        <div class="hint">validation is debounced (400ms)</div>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="taskPriority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <button class="btn-primary" id="submitBtn">Add Task</button>
      <button class="btn-danger" id="cancelEditBtn" style="display:none; margin-left:8px;">Cancel</button>
    </div>

    <div class="form-section">
      <h2>Task List</h2>
      <div class="status-bar" id="statusBar">no tasks yet</div>
      <ul class="task-list" id="taskList">
        <li class="empty-state" id="emptyState">no tasks added yet</li>
      </ul>
    </div>
  </div>

  <script>
    // load from localStorage on startup
    let tasks = loadFromStorage()
    let editingId = null

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem('spa_tasks')
        return raw ? JSON.parse(raw) : []
      } catch {
        return []
      }
    }

    function saveToStorage() {
      localStorage.setItem('spa_tasks', JSON.stringify(tasks))
    }

    // dom selectors
    const taskList = document.getElementById('taskList')
    const taskNameInput = document.getElementById('taskName')
    const taskEmailInput = document.getElementById('taskEmail')
    const taskPrioritySelect = document.getElementById('taskPriority')
    const submitBtn = document.getElementById('submitBtn')
    const cancelEditBtn = document.getElementById('cancelEditBtn')
    const statusBar = document.getElementById('statusBar')
    const emptyState = document.getElementById('emptyState')

    // validation functions
    function validateName(value) {
      if (!value.trim()) return 'name is required'
      if (value.trim().length < 3) return 'name must be at least 3 chars'
      return ''
    }

    function validateEmail(value) {
      if (!value.trim()) return 'email is required'
      // simple email regex pattern
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
      if (!emailPattern.test(value.trim())) return 'enter a valid email'
      return ''
    }

    function setFieldState(inputId, errorId, errorMsg) {
      const input = document.getElementById(inputId)
      const errorEl = document.getElementById(errorId)
      errorEl.textContent = errorMsg
      if (errorMsg) {
        input.className = 'invalid'
      } else if (input.value.trim()) {
        input.className = 'valid'
      } else {
        input.className = ''
      }
    }

    // debounce - wait until user stops typing
    function debounce(fn, delay) {
      let timer
      return function (...args) {
        clearTimeout(timer)
        timer = setTimeout(() => fn.apply(this, args), delay)
      }
    }

    const debouncedEmailValidation = debounce(function (value) {
      const error = validateEmail(value)
      setFieldState('taskEmail', 'taskEmailError', error)
    }, 400)

    const debouncedNameValidation = debounce(function (value) {
      const error = validateName(value)
      setFieldState('taskName', 'taskNameError', error)
    }, 300)

    // throttle - limit how often function runs
    function throttle(fn, interval) {
      let lastTime = 0
      return function (...args) {
        const now = Date.now()
        if (now - lastTime >= interval) {
          lastTime = now
          fn.apply(this, args)
        }
      }
    }

    const resizeInfo = document.getElementById('resizeInfo')
    const handleResize = throttle(function () {
      resizeInfo.textContent = `window width: ${window.innerWidth}px (throttled)`
      resizeInfo.style.display = 'block'
      // hide after 1.5 seconds
      clearTimeout(handleResize._timer)
      handleResize._timer = setTimeout(() => {
        resizeInfo.style.display = 'none'
      }, 1500)
    }, 500)

    // render all tasks
    function renderTasks() {
      // remove old items but keep emptyState
      const existing = taskList.querySelectorAll('.task-item')
      existing.forEach(el => el.remove())

      if (tasks.length === 0) {
        emptyState.style.display = 'block'
        statusBar.textContent = 'no tasks'
        return
      }

      emptyState.style.display = 'none'

      // create elements and traverse dom tree
      tasks.forEach(task => {
        const li = document.createElement('li')
        li.className = `task-item${editingId === task.id ? ' editing' : ''}`
        li.dataset.id = task.id

        // create child elements and append
        const nameSpan = document.createElement('span')
        nameSpan.textContent = task.name

        const emailSpan = document.createElement('span')
        emailSpan.style.fontSize = '11px'
        emailSpan.style.color = '#888'
        emailSpan.textContent = task.email

        const badge = document.createElement('span')
        badge.className = `task-priority priority-${task.priority}`
        badge.textContent = task.priority

        const editBtn = document.createElement('button')
        editBtn.className = 'btn-edit'
        editBtn.dataset.action = 'edit'
        editBtn.textContent = 'Edit'

        const deleteBtn = document.createElement('button')
        deleteBtn.className = 'btn-danger'
        deleteBtn.style.cssText = 'font-size:12px;padding:5px 10px;'
        deleteBtn.dataset.action = 'delete'
        deleteBtn.textContent = 'Delete'

        li.append(nameSpan, emailSpan, badge, editBtn, deleteBtn)
        taskList.append(li)
      })

      statusBar.textContent = `${tasks.length} task(s) | editing: ${editingId ? 'yes' : 'no'}`
    }

    // event delegation - one listener for all task actions
    // dont need to attach to each button separately
    taskList.addEventListener('click', function (e) {
      const btn = e.target.closest('[data-action]')
      if (!btn) return

      const li = btn.closest('.task-item')
      if (!li) return

      const id = Number(li.dataset.id)
      const action = btn.dataset.action

      if (action === 'delete') {
        tasks = tasks.filter(t => t.id !== id)
        saveToStorage()
        if (editingId === id) cancelEdit()
        renderTasks()
      }

      if (action === 'edit') {
        const task = tasks.find(t => t.id === id)
        if (!task) return

        editingId = id
        taskNameInput.value = task.name
        taskEmailInput.value = task.email
        taskPrioritySelect.value = task.priority
        submitBtn.textContent = 'Save Changes'
        cancelEditBtn.style.display = 'inline-block'
        taskNameInput.focus()
        renderTasks()
      }
    })

    submitBtn.addEventListener('click', function (e) {
      e.preventDefault()  // prevent default submit

      const name = taskNameInput.value
      const email = taskEmailInput.value
      const priority = taskPrioritySelect.value

      // validate both fields
      const nameError = validateName(name)
      const emailError = validateEmail(email)
      setFieldState('taskName', 'taskNameError', nameError)
      setFieldState('taskEmail', 'taskEmailError', emailError)

      if (nameError || emailError) return

      if (editingId) {
        tasks = tasks.map(t =>
          t.id === editingId ? { ...t, name: name.trim(), email: email.trim(), priority } : t
        )
        cancelEdit()
      } else {
        tasks.push({
          id: Date.now(),
          name: name.trim(),
          email: email.trim(),
          priority,
          completed: false,
        })
      }

      saveToStorage()
      clearForm()
      renderTasks()
    })

    cancelEditBtn.addEventListener('click', function () {
      cancelEdit()
      clearForm()
      renderTasks()
    })

    function cancelEdit() {
      editingId = null
      submitBtn.textContent = 'Add Task'
      cancelEditBtn.style.display = 'none'
    }

    function clearForm() {
      taskNameInput.value = ''
      taskEmailInput.value = ''
      taskPrioritySelect.value = 'medium'
      taskNameInput.className = ''
      taskEmailInput.className = ''
      document.getElementById('taskNameError').textContent = ''
      document.getElementById('taskEmailError').textContent = ''
    }

    // live validation while typing
    taskNameInput.addEventListener('input', (e) => debouncedNameValidation(e.target.value))
    taskEmailInput.addEventListener('input', (e) => debouncedEmailValidation(e.target.value))

    window.addEventListener('resize', handleResize)

    // init
    renderTasks()
  </script>
</body>
</html>
